<!doctype html>
<html><head><meta charset="utf-8">
<title>We've moved — Knotted</title>
<meta name="robots" content="noindex">
<script>
(async()=>{
  try{
    if("serviceWorker" in navigator){
      const rs = await navigator.serviceWorker.getRegistrations();
      for(const r of rs) await r.unregister();
    }
    if(window.caches){
      const ks = await caches.keys();
      for(const k of ks) await caches.delete(k);
    }
  }catch(e){}
  location.replace("https://knottedapp.github.io/" + location.hash);
})();
</script>
<meta http-equiv="refresh" content="3;url=https://knottedapp.github.io/">
</head><body style="font-family:sans-serif;text-align:center;padding-top:15vh">
<p>&#128141; We've moved! <a href="https://knottedapp.github.io/">Continue to Knotted</a></p>
</body></html>
